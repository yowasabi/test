<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>좀비 영역 전쟁 - 통합본</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }
    canvas { display: block; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
  </style>
</head>
<body>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <script>
    // ==========================================
    // 1. 게임 상수 및 설정 (CONSTANTS)
    // ==========================================
    const TILE_SIZE = 16;
    const COLS = 60; 
    const ROWS = 60;
    const CANVAS_W = COLS * TILE_SIZE;
    const CANVAS_H = ROWS * TILE_SIZE;
    const FRAME_RATE = 30;

    const GAME_TOTAL_TIME = 60;        
    const BETRAYAL_TRIGGER_TIME = 20;  
    const SOLO_TIME_LIMIT = 30;         
    const EMERGENCY_BETRAYAL_TIME = 30; 

    const PLAYER_SPEED = 8;             
    const BOOST_MULTIPLIER = 2.0;       
    const ITEM_DURATION = 150;          

    const ZOMBIE_COUNT = 6;             
    const ZOMBIE_MAX = 15;              
    const ZOMBIE_SPEED_NORMAL = 6.0;    
    const ZOMBIE_SPEED_BOOSTED = 11.0;  
    const ZOMBIE_SPAWN_INTERVAL = 150;  
    const ZOMBIE_RANDOM_CHANCE = 0.15;  

    const BOX_COUNT_EACH = 4;           
    const BONUS_LAND_RADIUS = 3;        

    const PHASE_LOBBY = 'LOBBY';
    const PHASE_COOP = 'COOP';          
    const PHASE_SOLO = 'SOLO';          
    const PHASE_BETRAYAL = 'BETRAYAL';  
    const PHASE_END = 'END';

    const OWNER_NONE = null;
    const OWNER_TEAM = 'team';
    const OWNER_A = 'A';
    const OWNER_B = 'B';
    const OWNER_ZOMBIE = 'Z';

    const BOX_TYPE_MEDICINE = 'medicine'; 
    const BOX_TYPE_BLOOD    = 'blood';    
    const BOX_TYPE_ENERGY   = 'energy';   

    const COLOR_EMPTY = '#1A1A24';
    const COLOR_GRID = '#2D2D3D';
    const COLOR_TEAM = '#4CAF50';
    const COLOR_A = '#2196F3';
    const COLOR_B = '#9C27B0';
    const COLOR_ZOMBIE = '#795548';

    // ==========================================
    // 2. 전역 변수 관리 시스템
    // ==========================================
    let grid = [];
    let playerA, playerB;
    let zombies = [];
    let boxes = [];
    let notifications = [];
    
    let phase = PHASE_LOBBY;
    let gameTimer = 0; 
    let soloTimer = 0;
    let deadPlayerId = null;
    let winner = null;
    let betrayalTriggered = false;
    let zombieBloodTimer = 0;
    let zombieSpawnTimer = 0;
    let betrayalAnnounceFade = 0;

    // ==========================================
    // 3. 맵 및 격자 시스템 (GRID)
    // ==========================================
    function initGrid() {
      grid = [];
      for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
          grid[r][c] = { owner: OWNER_NONE };
        }
      }
    }

    function setOwner(r, c, owner) {
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
      grid[r][c].owner = owner;
    }

    function getOwner(r, c) {
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
      return grid[r][c].owner;
    }

    function tileColor(owner) {
      if (owner === OWNER_TEAM) return COLOR_TEAM;
      if (owner === OWNER_A) return COLOR_A;
      if (owner === OWNER_B) return COLOR_B;
      if (owner === OWNER_ZOMBIE) return COLOR_ZOMBIE;
      return COLOR_EMPTY;
    }

    function drawGrid(p) {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const tile = grid[r][c];
          const x = c * TILE_SIZE;
          const y = r * TILE_SIZE;

          if (tile.owner) {
            p.fill(tileColor(tile.owner) + 'B3'); 
          } else {
            p.fill(COLOR_EMPTY);
          }
          p.noStroke();
          p.rect(x, y, TILE_SIZE, TILE_SIZE);

          p.stroke(COLOR_GRID);
          p.strokeWeight(0.3);
          p.noFill();
          p.rect(x, y, TILE_SIZE, TILE_SIZE);
        }
      }
    }

    function fillClosedArea(owner, tailList) {
      const tailSet = new Set(tailList.map(t => `${t.r},${t.c}`));
      const visited = new Set();
      const queue = [];

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
            const key = `${r},${c}`;
            if (grid[r][c].owner !== owner && !tailSet.has(key)) {
              visited.add(key);
              queue.push({ r, c });
            }
          }
        }
      }

      const dr = [-1, 1, 0, 0];
      const dc = [0, 0, -1, 1];

      while (queue.length > 0) {
        const curr = queue.shift();
        for (let i = 0; i < 4; i++) {
          const nr = curr.r + dr[i];
          const nc = curr.c + dc[i];
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
            const nKey = `${nr},${nc}`;
            if (!visited.has(nKey) && grid[nr][nc].owner !== owner && !tailSet.has(nKey)) {
              visited.add(nKey);
              queue.push({ r: nr, c: nc });
            }
          }
        }
      }

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const key = `${r},${c}`;
          if (grid[r][c].owner !== owner && !visited.has(key) && !tailSet.has(key)) {
            setOwner(r, c, owner);
          }
        }
      }
    }

    function voronoiSplit(posA, posB) {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (grid[r][c].owner === OWNER_TEAM) {
            const dA = Math.abs(r - posA.r) + Math.abs(c - posA.c);
            const dB = Math.abs(r - posB.r) + Math.abs(c - posB.c);
            grid[r][c].owner = dA <= dB ? OWNER_A : OWNER_B;
          }
        }
      }
    }

    function reallocateHalfTerritory(fromId, toId) {
      let targetTiles = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (grid[r][c].owner === fromId) {
            targetTiles.push({ r, c });
          }
        }
      }
      const halfCount = Math.floor(targetTiles.length / 2);
      for (let i = 0; i < halfCount; i++) {
        grid[targetTiles[i].r][targetTiles[i].c].owner = toId;
      }
    }

    function countTiles() {
      let counts = { team: 0, A: 0, B: 0, Z: 0, none: 0 };
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const o = grid[r][c].owner;
          if (o === OWNER_TEAM) counts.team++;
          else if (o === OWNER_A) counts.A++;
          else if (o === OWNER_B) counts.B++;
          else if (o === OWNER_ZOMBIE) counts.Z++;
          else counts.none++;
        }
      }
      return counts;
    }

    // ==========================================
    // 4. 플레이어 시스템 (PLAYER)
    // ==========================================
    class Player {
      constructor(id, startR, startC, keyUp, keyDown, keyLeft, keyRight, initDr, initDc) {
        this.id = id;
        this.r = startR;
        this.c = startC;
        this.dr = initDr;
        this.dc = initDc;
        this.nextDr = initDr;
        this.nextDc = initDc;
        this.keys = { up: keyUp, down: keyDown, left: keyLeft, right: keyRight };
        this.alive = true;
        this.tail = [];
        this.owner = OWNER_TEAM;
        this.boostTimer = 0;
        this.steelTailTimer = 0;
        this.moveAccum = 0;
      }

      get speed() {
        return this.boostTimer > 0 ? PLAYER_SPEED * BOOST_MULTIPLIER : PLAYER_SPEED;
      }

      get displayColor() {
        if (this.owner === OWNER_TEAM) return COLOR_TEAM;
        return this.id === 'A' ? COLOR_A : COLOR_B;
      }

      setPhase(phase) {
        this.owner = (phase === PHASE_COOP || phase === PHASE_SOLO) ? OWNER_TEAM
                   : (this.id === 'A' ? OWNER_A : OWNER_B);
      }

      handleKeyPressed(kc) {
        if (kc === this.keys.up    && this.dr !== 1)  { this.nextDr = -1; this.nextDc = 0; }
        if (kc === this.keys.down  && this.dr !== -1) { this.nextDr = 1;  this.nextDc = 0; }
        if (kc === this.keys.left  && this.dc !== 1)  { this.nextDr = 0;  this.nextDc = -1; }
        if (kc === this.keys.right && this.dc !== -1) { this.nextDr = 0;  this.nextDc = 1; }
      }

      update(phase, p) {
        if (!this.alive) return;
        if (this.boostTimer > 0) this.boostTimer--;
        if (this.steelTailTimer > 0) this.steelTailTimer--;

        this.moveAccum += this.speed / FRAME_RATE;
        while (this.moveAccum >= 1) {
          this.moveAccum -= 1;
          this._step(phase, p);
        }
      }

      _step(phase, p) {
        this.dr = this.nextDr;
        this.dc = this.nextDc;
        const nr = this.r + this.dr;
        const nc = this.c + this.dc;

        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return; 

        this.r = nr;
        this.c = nc;
        const currentTileOwner = getOwner(this.r, this.c);

        if (currentTileOwner === this.owner) {
          if (this.tail.length > 0) {
            this.tail.push({ r: this.r, c: this.c });
            fillClosedArea(this.owner, this.tail);
            this.tail = [];
          }
        } else {
          if (this.tail.some(t => t.r === this.r && t.c === this.c)) {
            if (this.steelTailTimer <= 0) {
              this.alive = false;
              return;
            }
          }
          this.tail.push({ r: this.r, c: this.c });
        }
      }

      isInOwnTerritory() {
        return getOwner(this.r, this.c) === this.owner;
      }

      cutTailAt(index) {
        if (this.steelTailTimer > 0) return; 
        if (this.isInOwnTerritory()) return; 
        this.alive = false;
      }

      revive(r, c, owner) {
        this.r = r; this.c = c;
        this.dr = 0; this.dc = 1;
        this.nextDr = 0; this.nextDc = 1;
        this.tail = [];
        this.alive = true;
        this.owner = owner;
        this.boostTimer = 0;
        this.steelTailTimer = 0;
        this.moveAccum = 0;
      }

      draw(p) {
        if (!this.alive) return;
        const tailCol = this.steelTailTimer > 0 ? '#B0BEC5' : this.displayColor;
        p.noStroke();
        for (const t of this.tail) {
          p.fill(tailCol);
          p.rect(t.c * TILE_SIZE + 3, t.r * TILE_SIZE + 3, TILE_SIZE - 6, TILE_SIZE - 6, 2);
        }

        const x = this.c * TILE_SIZE;
        const y = this.r * TILE_SIZE;
        if (this.boostTimer > 0) {
          p.fill(0, 255, 255, 80);
          p.rect(x - 2, y - 2, TILE_SIZE + 4, TILE_SIZE + 4, 4);
        }
        p.fill(this.id === 'A' ? COLOR_A : COLOR_B);
        p.rect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2, 4);
        p.fill(255);
        p.rect(x + 4, y + 4, 3, 3);
        p.rect(x + TILE_SIZE - 7, y + 4, 3, 3);
      }
    }

    function initPlayers() {
      playerA = new Player('A', 10, 10, 87, 83, 65, 68, 0, 1);       
      playerB = new Player('B', ROWS - 11, COLS - 11, 38, 40, 37, 39, 0, -1); 
    }

    function updatePlayers(phase, p) {
      playerA.update(phase, p);
      playerB.update(phase, p);

      if (!playerA.alive || !playerB.alive) return;

      if (playerA.r === playerB.r && playerA.c === playerB.c) {
        playerA.r -= playerA.dr; playerA.c -= playerA.dc;
        playerB.r -= playerB.dr; playerB.c -= playerB.dc;
        playerA.nextDr = -playerA.dr; playerA.nextDc = -playerA.dc;
        playerB.nextDr = -playerB.dr; playerB.nextDc = -playerB.dc;
      }

      let cutA = -1, cutB = -1;
      for (let i = 0; i < playerB.tail.length; i++) {
        if (playerA.r === playerB.tail[i].r && playerA.c === playerB.tail[i].c) {
          cutB = i; break;
        }
      }
      for (let i = 0; i < playerA.tail.length; i++) {
        if (playerB.r === playerA.tail[i].r && playerB.c === playerA.tail[i].c) {
          cutA = i; break;
        }
      }
      if (cutB !== -1) playerB.cutTailAt(cutB);
      if (cutA !== -1) playerA.cutTailAt(cutA);
    }

    // ==========================================
    // 5. 좀비 AI 시스템 (ZOMBIE)
    // ==========================================
    class Zombie {
      constructor(r, c) {
        this.r = r; this.c = c;
        this.dr = 0; this.dc = 1;
        this.moveAccum = 0;
        this.tail = [];
        this.alive = true;
      }

      get speed() {
        return zombieBloodTimer > 0 ? ZOMBIE_SPEED_BOOSTED : ZOMBIE_SPEED_NORMAL;
      }

      update(players, p) {
        if (!this.alive) return;
        this.moveAccum += this.speed / FRAME_RATE;
        while (this.moveAccum >= 1) {
          this.moveAccum -= 1;
          this._step(players, p);
          if (!this.alive) return;
        }
      }

      _step(players, p) {
        if (p.random() < ZOMBIE_RANDOM_CHANCE) {
          this._randomDir(p);
        } else {
          let target = null;
          let minDist = 9999;
          for (const pl of players) {
            if (!pl.alive) continue;
            const d = p.dist(this.c, this.r, pl.c, pl.r);
            if (d < minDist) { minDist = d; target = pl; }
          }
          if (target) {
            if (p.abs(target.c - this.c) > p.abs(target.r - this.r)) {
              this.dc = target.c > this.c ? 1 : -1; this.dr = 0;
            } else {
              this.dr = target.r > this.r ? 1 : -1; this.dc = 0;
            }
          } else {
            this._randomDir(p);
          }
        }

        const nr = this.r + this.dr;
        const nc = this.c + this.dc;
        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) {
          this._randomDir(p);
          return;
        }

        this.r = nr;
        this.c = nc;
        const tileOwner = getOwner(this.r, this.c);
        if (tileOwner === OWNER_ZOMBIE) {
          if (this.tail.length > 0) {
            this.tail.push({ r: this.r, c: this.c });
            fillClosedArea(OWNER_ZOMBIE, this.tail);
            this.tail = [];
          }
        } else {
          this.tail.push({ r: this.r, c: this.c });
        }
      }

      _randomDir(p) {
        const rands = [[-1, 0], [1, 0], [0, -1], [0, 1]];
        const pick = p.random(rands);
        this.dr = pick[0]; this.dc = pick[1];
      }

      cutTailAt(index) {
        this.alive = false;
        this.tail = [];
      }

      draw(p) {
        if (!this.alive) return;
        p.noStroke();
        p.fill(121, 85, 72, 120);
        for (const t of this.tail) {
          p.rect(t.c * TILE_SIZE + 4, t.r * TILE_SIZE + 4, TILE_SIZE - 8, TILE_SIZE - 8);
        }
        const x = this.c * TILE_SIZE;
        const y = this.r * TILE_SIZE;
        p.fill(COLOR_ZOMBIE);
        p.rect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4, 3);
        p.fill(255, 0, 0);
        p.rect(x + 5, y + 5, 2, 2);
        p.rect(x + TILE_SIZE - 7, y + 5, 2, 2);
      }
    }

    function initZombies() {
      zombies = [];
      zombieBloodTimer = 0;
      zombieSpawnTimer = 0;
      const startPositions = [[2, 2], [2, COLS - 3], [ROWS - 3, 2], [ROWS - 3, COLS - 3]];
      for (let i = 0; i < Math.min(ZOMBIE_COUNT, startPositions.length); i++) {
        zombies.push(new Zombie(startPositions[i][0], startPositions[i][1]));
      }
    }

    function updateZombies(players, p) {
      if (zombieBloodTimer > 0) zombieBloodTimer--;
      zombieSpawnTimer++;
      if (zombieSpawnTimer >= ZOMBIE_SPAWN_INTERVAL && zombies.length < ZOMBIE_MAX) {
        zombieSpawnTimer = 0;
        _spawnZombie(p);
      }

      for (let i = zombies.length - 1; i >= 0; i--) {
        const z = zombies[i];
        if (!z.alive) { zombies.splice(i, 1); continue; }
        z.update(players, p);
      }

      for (const z of zombies) {
        for (const pl of players) {
          if (!pl.alive) continue;
          for (let i = 0; i < z.tail.length; i++) {
            if (pl.r === z.tail[i].r && pl.c === z.tail[i].c) z.cutTailAt(i);
          }
          if (z.r === pl.r && z.c === pl.c) {
            if (!pl.isInOwnTerritory() && pl.steelTailTimer <= 0) pl.alive = false; 
          }
        }
      }
    }

    function _spawnZombie(p) {
      const edges = [
        {r: 0, c: Math.floor(p.random(COLS))},
        {r: ROWS-1, c: Math.floor(p.random(COLS))},
        {r: Math.floor(p.random(ROWS)), c: 0},
        {r: Math.floor(p.random(ROWS)), c: COLS-1}
      ];
      const spawnPoint = p.random(edges);
      zombies.push(new Zombie(spawnPoint.r, spawnPoint.c));
    }

    // ==========================================
    // 6. 아이템 상자 시스템 (TILE/BOX)
    // ==========================================
    function initTiles(p) {
      boxes = [];
      const types = [BOX_TYPE_MEDICINE, BOX_TYPE_BLOOD, BOX_TYPE_ENERGY];
      for (const type of types) {
        let placed = 0;
        while (placed < BOX_COUNT_EACH) {
          const r = Math.floor(p.random(4, ROWS - 5));
          const c = Math.floor(p.random(4, COLS - 5));
          if (boxes.some(b => b.r === r && b.c === c)) continue;
          boxes.push({ r, c, type });
          placed++;
        }
      }
    }

    function drawTiles(p) {
      for (const box of boxes) {
        const x = box.c * TILE_SIZE;
        const y = box.r * TILE_SIZE;
        const size = TILE_SIZE * 2; 

        p.stroke(255, 255, 255, 200);
        p.strokeWeight(1.5);
        if (box.type === BOX_TYPE_MEDICINE) p.fill('#00E676');
        else if (box.type === BOX_TYPE_BLOOD) p.fill('#FF1744');
        else p.fill('#00B0FF');
        p.rect(x, y, size, size, 4);

        p.textAlign(p.CENTER, p.CENTER);
        p.textSize(TILE_SIZE * 1.3);
        p.noStroke(); p.fill(255);
        let label = box.type === BOX_TYPE_MEDICINE ? '💊' : (box.type === BOX_TYPE_BLOOD ? '🩸' : '⚡');
        p.text(label, x + TILE_SIZE, y + TILE_SIZE);
      }
    }

    function checkTilePickup(player, phase, p) {
      for (let i = boxes.length - 1; i >= 0; i--) {
        const box = boxes[i];
        if ((player.r === box.r || player.r === box.r + 1) && (player.c === box.c || player.c === box.c + 1)) {
          _applyBoxEffect(box, player, phase, p);
          boxes.splice(i, 1); 
        }
      }
    }

    function _applyBoxEffect(box, player, phase, p) {
      switch (box.type) {
        case BOX_TYPE_MEDICINE:
          const currentOwner = (phase === PHASE_COOP || phase === PHASE_SOLO) ? OWNER_TEAM : player.owner;
          for (let dr = -BONUS_LAND_RADIUS; dr <= BONUS_LAND_RADIUS; dr++) {
            for (let dc = -BONUS_LAND_RADIUS; dc <= BONUS_LAND_RADIUS; dc++) {
              const nr = player.r + dr; const nc = player.c + dc;
              if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) setOwner(nr, nc, currentOwner);
            }
          }
          showNotification(player.id, "보너스땅 물약 획득!", "#00E676");
          break;
        case BOX_TYPE_BLOOD:
          zombieBloodTimer = ITEM_DURATION; 
          showNotification(player.id, "피 장판 자극! 좀비 폭주!", "#FF1744");
          break;
        case BOX_TYPE_ENERGY:
          player.boostTimer = ITEM_DURATION;
          player.steelTailTimer = ITEM_DURATION;
          showNotification(player.id, "에너지드링크 속도/무적 버프!", "#00B0FF");
          break;
      }
    }

    // ==========================================
    // 7. 인터페이스 시스템 (UI)
    // ==========================================
    function showNotification(playerId, msg, color) {
      notifications.push({ playerId, msg, color, timer: 90 });
      if (notifications.length > 3) notifications.shift();
    }

    function drawUI(p, phase, timeLeft, counts) {
      p.push();
      p.noStroke(); p.fill(0, 0, 0, 230);
      p.rect(0, 0, CANVAS_W, 45);

      const barX = 15; const barY = 28; const barW = CANVAS_W - 30; const barH = 10;
      p.fill(50); p.rect(barX, barY, barW, barH, 4);

      const totalTiles = ROWS * COLS;
      if (phase === PHASE_COOP || phase === PHASE_SOLO) {
        p.fill(COLOR_TEAM);
        p.rect(barX, barY, barW * (counts.team / totalTiles), barH, 4);
      } else {
        const ratioA = counts.A / totalTiles; const ratioB = counts.B / totalTiles;
        p.fill(COLOR_A); p.rect(barX, barY, barW * ratioA, barH, 4);
        p.fill(COLOR_B); p.rect(barX + (barW * ratioA), barY, barW * ratioB, barH, 4);
      }

      p.textSize(12); p.fill(255); p.textAlign(p.LEFT, p.TOP);
      let modeName = phase === PHASE_SOLO ? "독자 생존 타임어택" : (phase === PHASE_BETRAYAL ? "⚠️ 배신 서바이벌 ⚠️" : "협력전 모드");
      p.text(`${modeName} | 남은 시간: ${Math.ceil(timeLeft)}초`, 15, 8);

      for (let i = 0; i < notifications.length; i++) {
        const n = notifications[i]; n.timer--;
        p.fill(n.color); p.textAlign(p.RIGHT, p.TOP);
        p.text(`[P-${n.playerId}] ${n.msg}`, CANVAS_W - 15, 8 + (i * 14));
      }
      notifications = notifications.filter(n => n.timer > 0);
      p.pop();
    }

    function drawBetrayalAnnounce(p) {
      if (betrayalAnnounceFade <= 0) return;
      betrayalAnnounceFade--;
      p.push();
      p.fill(255, 23, 68, Math.min(220, betrayalAnnounceFade * 4));
      p.rect(0, CANVAS_H/2 - 40, CANVAS_W, 80);
      p.fill(255); p.textAlign(p.CENTER, p.CENTER);
      p.textSize(24); p.text("⚠ 배신 타이머 발동! ⚠", CANVAS_W / 2, CANVAS_H / 2 - 12);
      p.textSize(14); p.text("이제부터 팀원은 적입니다! 더 많은 땅을 차지하세요!", CANVAS_W / 2, CANVAS_H / 2 + 16);
      p.pop();
    }

    function drawLobby(p) {
      p.background(15, 15, 25);
      p.textAlign(p.CENTER, p.CENTER);
      p.fill(COLOR_TEAM); p.textSize(36);
      p.text("좀비 영역 전쟁", CANVAS_W / 2, CANVAS_H / 2 - 50);
      p.fill(200); p.textSize(16);
      p.text("시작하려면 [ SPACE ] 키를 누르세요", CANVAS_W / 2, CANVAS_H / 2 + 20);
    }

    function drawResultScreen(p, counts, winner) {
      p.push(); p.fill(0, 0, 0, 220); p.rect(0, 0, CANVAS_W, CANVAS_H);
      p.fill(255); p.textAlign(p.CENTER, p.CENTER); p.textSize(32);
      p.text("게임 종료", CANVAS_W / 2, CANVAS_H / 2 - 80);

      let winText = winner === 'A' ? "플레이어 A 우승! (파란색)" : (winner === 'B' ? "플레이어 B 우승! (보라색)" : (winner === 'draw' ? "무승부! 땅 크기 동일" : "좀비 무리의 승리!"));
      p.fill(winner === 'A' ? COLOR_A : (winner === 'B' ? COLOR_B : '#FF5252'));
      p.textSize(18); p.text(winText, CANVAS_W / 2, CANVAS_H / 2 - 20);

      p.fill(255); p.textSize(14);
      p.text(`A 영역: ${counts.A}칸 | B 영역: ${counts.B}칸`, CANVAS_W / 2, CANVAS_H / 2 + 30);
      p.text("재시작하려면 [ R ] 키를 누르세요", CANVAS_W / 2, CANVAS_H / 2 + 80);
      p.pop();
    }

    // ==========================================
    // 8. 핵심 게임 루트 메인 루프 (SKETCH)
    // ==========================================
    function setup() {
      createCanvas(CANVAS_W, CANVAS_H);
      frameRate(FRAME_RATE);
      resetGame();
    }

    function resetGame() {
      initGrid();
      initZombies();
      initPlayers();
      initTiles(this);
      gameTimer = GAME_TOTAL_TIME * FRAME_RATE;
      soloTimer = 0;
      deadPlayerId = null;
      winner = null;
      betrayalTriggered = false;
      phase = PHASE_LOBBY;
    }

    function draw() {
      background(COLOR_EMPTY);

      if (phase === PHASE_LOBBY) { drawLobby(this); return; }
      if (phase === PHASE_END) {
        drawGrid(this); drawTiles(this); drawZombies(this); playerA.draw(this); playerB.draw(this);
        drawResultScreen(this, countTiles(), winner); return;
      }

      gameTimer--;
      let timeLeftSec = gameTimer / FRAME_RATE;

      if (!betrayalTriggered && phase === PHASE_COOP && timeLeftSec <= BETRAYAL_TRIGGER_TIME) {
        betrayalTriggered = true;
        phase = PHASE_BETRAYAL;
        playerA.setPhase(PHASE_BETRAYAL); playerB.setPhase(PHASE_BETRAYAL);
        voronoiSplit(playerA, playerB);
        betrayalAnnounceFade = 90;
      }

      if (phase === PHASE_SOLO) {
        soloTimer--;
        if (soloTimer <= 0) {
          betrayalTriggered = true; phase = PHASE_BETRAYAL;
          playerA.setPhase(PHASE_BETRAYAL); playerB.setPhase(PHASE_BETRAYAL);
          if (deadPlayerId === 'A') { playerA.revive(10, 10, OWNER_A); voronoiSplit(playerA, playerB); reallocateHalfTerritory(OWNER_B, OWNER_A); }
          else if (deadPlayerId === 'B') { playerB.revive(ROWS - 11, COLS - 11, OWNER_B); voronoiSplit(playerA, playerB); reallocateHalfTerritory(OWNER_A, OWNER_B); }
          deadPlayerId = null;
          gameTimer = EMERGENCY_BETRAYAL_TIME * FRAME_RATE;
          betrayalAnnounceFade = 90;
        }
      }

      if (gameTimer <= 0) { _endGame('timer'); return; }

      updatePlayers(phase, this);
      updateZombies([playerA, playerB], this);
      checkTilePickup(playerA, phase, this);
      checkTilePickup(playerB, phase, this);

      if (phase === PHASE_COOP) {
        if (!playerA.alive) { phase = PHASE_SOLO; deadPlayerId = 'A'; soloTimer = SOLO_TIME_LIMIT * FRAME_RATE; gameTimer = soloTimer; }
        else if (!playerB.alive) { phase = PHASE_SOLO; deadPlayerId = 'B'; soloTimer = SOLO_TIME_LIMIT * FRAME_RATE; gameTimer = soloTimer; }
      }

      if (!playerA.alive && !playerB.alive && phase !== PHASE_SOLO) { _endGame('zombie'); return; }

      drawGrid(this);
      drawTiles(this);
      for (const z of zombies) z.draw(this);
      playerA.draw(this);
      playerB.draw(this);
      drawUI(this, phase, phase === PHASE_SOLO ? soloTimer/FRAME_RATE : gameTimer/FRAME_RATE, countTiles());
      drawBetrayalAnnounce(this);
    }

    function _endGame(reason) {
      phase = PHASE_END;
      const counts = countTiles();
      if (reason === 'timer') {
        if (counts.A > counts.B) winner = 'A';
        else if (counts.B > counts.A) winner = 'B';
        else winner = 'draw';
      } else { winner = 'zombie'; }
    }

    function keyPressed() {
      if (phase === PHASE_LOBBY && keyCode === 32) { phase = PHASE_COOP; return; }
      if (phase === PHASE_END && (key === 'r' || key === 'R')) { resetGame(); return; }
      if (playerA) playerA.handleKeyPressed(keyCode);
      if (playerB) playerB.handleKeyPressed(keyCode);
    }
  </script>
